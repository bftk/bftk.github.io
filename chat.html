<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self'; connect-src https://chat.bftk-game.com; frame-ancestors 'none';">
<title>BFTK - 深海コールセンター</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100dvh; transition: background 0.8s ease; }

/* ===== 背景キャラグロー ===== */
.bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0; transition: opacity 0.8s ease, background 0.8s ease; }
body.theme-menda .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(255,140,80,.15), transparent 60%); }
body.theme-gusoku .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(160,160,180,.12), transparent 60%); }
body.theme-demeni .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(80,180,255,.15), transparent 60%); }
body.theme-oumu .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(220,180,60,.15), transparent 60%); }
body.theme-ryuuguu .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(255,120,170,.12), transparent 60%); }
body.theme-houzuki .bg-glow { opacity: 1; background: radial-gradient(circle at 50% 30%, rgba(160,100,220,.15), transparent 60%); }

/* ===== コンテナ ===== */
.vn-container { position: relative; z-index: 1; width: 420px; max-width: 95vw; height: 100dvh; max-height: 750px; display: flex; flex-direction: column; overflow: hidden; background: #0a0a1a; border-radius: 12px; border: 1px solid rgba(26,35,126,.5); }

/* ===== 立ち絵エリア ===== */
.portrait-area {
  position: relative; flex-shrink: 0; height: 260px; overflow: hidden;
  background: linear-gradient(180deg, #0a0a1a 0%, #0f1028 100%);
}
/* 深海パーティクル */
.portrait-area::before {
  content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 5px 5px; opacity: .3;
}
/* 下部グラデーション（立ち絵→UIの境界をなじませる） */
.portrait-area::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; z-index: 2;
  background: linear-gradient(transparent, #0f1028);
}
.portrait-img {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 280px; height: 280px; object-fit: cover; object-position: top center;
  transition: opacity 0.5s ease, transform 0.5s ease;
  z-index: 1;
}
.portrait-img.hidden { opacity: 0; transform: translateX(-50%) scale(.95); }
.portrait-img.visible { opacity: 1; transform: translateX(-50%) scale(1); }

/* ヘッダー（立ち絵の上にオーバーレイ） */
.vn-header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 3;
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(180deg, rgba(10,10,26,.9), transparent);
}
.vn-header .title { font-size: 14px; color: #8899cc; letter-spacing: .1em; }
.vn-header .title span { font-size: 10px; display: block; opacity: .6; margin-top: 2px; }

/* アクティブキャラ名（立ち絵下部） */
.active-name-bar {
  position: absolute; bottom: 8px; left: 16px; z-index: 3;
  display: flex; align-items: center; gap: 8px;
  transition: opacity .4s ease;
}
.active-name-bar .indicator { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; animation: pulse 2s ease-in-out infinite; }
.active-name-bar .name { font-size: 15px; font-weight: 700; letter-spacing: .1em; text-shadow: 0 0 12px rgba(0,0,0,.8); }
.active-name-bar .role { font-size: 10px; opacity: .6; text-shadow: 0 0 8px rgba(0,0,0,.8); }
@keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

.active-name-bar.menda { color: #c07040; }
.active-name-bar.gusoku { color: #999; }
.active-name-bar.demeni { color: #4080a0; }
.active-name-bar.oumu { color: #a09040; }
.active-name-bar.ryuuguu { color: #a06070; }
.active-name-bar.houzuki { color: #8060a0; }

/* ===== ダイアログエリア ===== */
.dialog-area {
  flex: 1; min-height: 0; display: flex; flex-direction: column;
  background: linear-gradient(180deg, #0f1028, #1a1a2e);
  border-top: 1px solid rgba(255,255,255,.06);
}

/* チャットログ */
.chat-log { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

/* メッセージ共通 */
.msg { padding: 8px 12px; border-radius: 10px; max-width: 90%; font-size: 13px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; animation: msgIn .35s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { background: rgba(255,255,255,.06); align-self: flex-end; border: 1px solid rgba(255,255,255,.08); }
.msg.error { background: rgba(120,0,0,.3); align-self: flex-start; border: 1px solid rgba(255,68,68,.3); color: #e0e0e0; }
.msg.system { background: transparent; align-self: center; color: #556; font-size: 11px; border: none; }

/* Bot VNメッセージ */
.msg.bot {
  align-self: flex-start; width: 100%; max-width: 100%;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px; padding: 10px 14px; position: relative; overflow: hidden;
}
.msg.bot::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, currentColor, transparent); opacity: .3;
}
.msg.bot.menda { color: #c07040; }
.msg.bot.gusoku { color: #999; }
.msg.bot.demeni { color: #4080a0; }
.msg.bot.oumu { color: #a09040; }
.msg.bot.ryuuguu { color: #a06070; }
.msg.bot.houzuki { color: #8060a0; }
.msg.bot .msg-body { color: #e0e0e0; }
.msg.bot .msg-body a { color: #8899cc; text-decoration: underline; }

/* ネームプレート */
.char-label {
  display: inline-flex; align-items: center;
  padding: 2px 0; margin-bottom: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
}
.char-label::before { content: ""; width: 14px; height: 1px; background: currentColor; margin-right: 6px; opacity: .6; }

/* 引き継ぎ演出 */
.msg.system.transfer { letter-spacing: .2em; font-size: 10px; color: #556; animation: pulse 1.4s ease infinite; }

/* ローディング */
.msg.loading { align-self: center; background: transparent; border: none; color: #556; font-size: 11px; letter-spacing: .15em; animation: pulse 1.4s ease infinite; }
@keyframes dots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
.loading-dots::after { content: ''; animation: dots 1.2s steps(1) infinite; }

/* ===== ボタンメニュー ===== */
.btn-menu { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; justify-content: center; border-top: 1px solid rgba(255,255,255,.04); flex-shrink: 0; }
.btn-menu button {
  padding: 6px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,.10);
  background: transparent; color: #889; font-size: 12px; cursor: pointer; transition: all .3s ease;
}
.btn-menu button:hover { background: rgba(26,35,126,.4); color: #ccd; border-color: rgba(26,35,126,.6); }
.btn-menu button:disabled { opacity: .3; cursor: not-allowed; }

/* ===== 入力エリア ===== */
.chat-input { display: flex; padding: 8px 12px; gap: 6px; border-top: 1px solid rgba(255,255,255,.04); flex-shrink: 0; }
.chat-input input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03); color: #e0e0e0; font-size: 13px; outline: none; }
.chat-input input:focus { border-color: rgba(26,35,126,.6); box-shadow: 0 0 8px rgba(26,35,126,.2); }
.chat-input button { padding: 8px 16px; border-radius: 8px; border: none; background: #1A237E; color: #e0e8ff; font-weight: bold; font-size: 13px; cursor: pointer; transition: all .3s ease; }
.chat-input button:disabled { background: #222; cursor: not-allowed; }

/* 報告モード */
.report-mode-label { color: #a06070; font-size: 11px; padding: 4px 12px; text-align: center; flex-shrink: 0; }
.cancel-btn { color: #667; cursor: pointer; text-decoration: underline; margin-left: 6px; background: none; border: none; font-size: 11px; padding: 0; }
.cancel-btn:hover { color: #e0e0e0; }
.cancel-btn:focus { outline: 1px solid #8899cc; outline-offset: 2px; }

/* ===== 内線電話スクリーン ===== */
.call-screen {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px;
  background: radial-gradient(ellipse at 50% 60%, #0f1028, #0a0a1a);
  transition: opacity .6s ease;
}
.call-screen.hidden { opacity: 0; pointer-events: none; }
.call-screen .cs-label {
  font-size: 12px; letter-spacing: .2em; color: #aab; text-align: center; line-height: 1.8;
}
.call-screen .cs-label strong { display: block; font-size: 16px; color: #8899cc; letter-spacing: .15em; margin-bottom: 4px; }
.call-btn {
  width: 200px; height: 200px; border-radius: 50%; border: 2px solid rgba(26,35,126,.5);
  background: radial-gradient(circle, rgba(26,35,126,.3), rgba(10,10,26,.8));
  color: #8899cc; font-size: 36px; cursor: pointer;
  transition: all .3s ease; position: relative;
  display: flex; justify-content: center; align-items: center;
}
.call-btn:hover { border-color: rgba(26,35,126,.8); background: radial-gradient(circle, rgba(26,35,126,.5), rgba(10,10,26,.8)); transform: scale(1.05); box-shadow: 0 0 24px rgba(26,35,126,.3); }
.call-btn:active { transform: scale(.97); }
.call-btn.ringing { animation: phoneShake .3s ease-in-out infinite; }
@keyframes phoneShake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15% { transform: translateX(-6px) rotate(-10deg); }
  30% { transform: translateX(6px) rotate(10deg); }
  45% { transform: translateX(-5px) rotate(-8deg); }
  60% { transform: translateX(5px) rotate(8deg); }
  75% { transform: translateX(-3px) rotate(-4deg); }
  90% { transform: translateX(3px) rotate(4deg); }
}
.call-btn .ring-wave {
  position: absolute; inset: -8px; border-radius: 50%; border: 1px solid rgba(26,35,126,.3);
  animation: ringWave 2s ease-out infinite;
}
.call-btn .ring-wave:nth-child(2) { animation-delay: .6s; }
@keyframes ringWave { 0% { transform: scale(1); opacity: .5; } 100% { transform: scale(1.5); opacity: 0; } }

.call-status { font-size: 12px; letter-spacing: .15em; color: #aab; height: 18px; text-align: center; }
.call-status.ringing { color: #8899cc; animation: pulse 1s ease-in-out infinite; }
.call-status.connected { color: #c07040; }

/* 初期: 立ち絵非表示、ダイアログ非表示 */
.portrait-img.pre-call { opacity: 0; transform: translateX(-50%) scale(.9); }
.active-name-bar.pre-call { opacity: 0; }
.dialog-area.pre-call { opacity: 0; transition: opacity .5s ease; }
.dialog-area.active { opacity: 1; }
</style>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div class="bg-glow"></div>
<div class="vn-container">
  <!-- コールスクリーン（初期画面） -->
  <div class="call-screen" id="callScreen">
    <div class="cs-label"><strong>BFTK Deep Sea CS</strong>深海カスタマーサービス</div>
    <button class="call-btn" id="callBtn" onclick="startCall()" aria-label="コールする">
      <div class="ring-wave"></div>
      <div class="ring-wave"></div>
      <img src="assets/cs/call-icon.png" alt="コール" style="width:140px;height:140px;pointer-events:none;">
    </button>
    <div class="call-status" id="callStatus">Tap to Call</div>
  </div>

  <!-- 立ち絵エリア -->
  <div class="portrait-area">
    <div class="vn-header">
      <div class="title">BFTK Deep Sea CS<span>深海コールセンター</span></div>
    </div>
    <img class="portrait-img pre-call" id="portrait" src="assets/cs/menda.webp" alt="キャラクター立ち絵">
    <div class="active-name-bar menda pre-call" id="activeNameBar">
      <div class="indicator"></div>
      <div class="name">メンダ</div>
      <div class="role">総合受付</div>
    </div>
  </div>

  <!-- ダイアログエリア -->
  <div class="dialog-area pre-call" id="dialogArea">
    <div class="chat-log" id="chatLog" role="log" aria-live="polite" aria-label="チャット履歴">
    </div>
    <div class="btn-menu" id="btnMenu" role="toolbar" aria-label="メニュー">
      <button onclick="onMenuBtn('faq')">ゲームについて</button>
      <button onclick="onMenuBtn('billing')">お支払い</button>
      <button onclick="onMenuBtn('policy')">規約</button>
      <button onclick="onMenuBtn('bug')">バグ報告</button>
      <button onclick="onMenuBtn('feedback')">ご意見・要望</button>
      <button onclick="onMenuBtn('survey')">アンケート</button>
    </div>
    <div class="report-mode-label" id="reportLabel" style="display:none;"><span id="reportLabelText"></span> <button class="cancel-btn" onclick="cancelReportMode()">[ キャンセル ]</button></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="メンダに話しかける..." maxlength="500" aria-label="メッセージ入力">
      <button id="sendBtn" onclick="sendMsg()">送信</button>
    </div>
  </div>
</div>
<script>
const WORKER_URL = "https://chat.bftk-game.com";
const SESSION_LIMIT = 30;
const SESSION_KEY = "bftk_chat_session";
const chatLog = document.getElementById("chatLog");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const btnMenu = document.getElementById("btnMenu");
const reportLabel = document.getElementById("reportLabel");
const reportLabelText = document.getElementById("reportLabelText");
const portrait = document.getElementById("portrait");
const activeNameBar = document.getElementById("activeNameBar");
const callScreen = document.getElementById("callScreen");
const callStatus = document.getElementById("callStatus");
const dialogArea = document.getElementById("dialogArea");

const VALID_CHARACTERS = ["menda", "gusoku", "demeni", "oumu", "ryuuguu", "houzuki"];
const CHAR_NAMES = { menda: "メンダ", gusoku: "グソク", demeni: "デメニ", oumu: "オウム", ryuuguu: "リュウグウ", houzuki: "ホウズキ" };
const CHAR_ROLES = { menda: "総合受付", gusoku: "規約担当", demeni: "課金担当", oumu: "FAQ担当", ryuuguu: "お客様の声", houzuki: "アンケート" };

let conversationHistory = [];
let reportMode = false;
let currentCharacter = "menda";
let isSending = false;

// ===== コール演出 =====
function startCall() {
  const btn = document.getElementById("callBtn");
  btn.disabled = true;
  btn.style.pointerEvents = "none";
  btn.classList.add("ringing");
  callStatus.textContent = "Calling...";
  callStatus.className = "call-status ringing";

  setTimeout(() => {
    callStatus.textContent = "Connected";
    callStatus.className = "call-status connected";
  }, 1600);

  setTimeout(() => {
    // コールスクリーンをフェードアウト
    callScreen.classList.add("hidden");
    // テーマ適用
    document.body.className = "theme-menda";
    // 立ち絵フェードイン
    portrait.classList.remove("pre-call");
    portrait.classList.add("visible");
    activeNameBar.classList.remove("pre-call");
    // ダイアログ表示
    dialogArea.classList.remove("pre-call");
    dialogArea.classList.add("active");
    // メンダの応答
    setTimeout(() => {
      addCharMsg("menda", "はい…深海カスタマーサービスです。受付のメンダです。…ご用件をどうぞ。");
      if (checkSessionLimit()) {
        setInputDisabled(false);
        msgInput.placeholder = "メンダに話しかける...";
      }
      msgInput.focus();
    }, 400);
  }, 2400);
}

// ===== テーマ+立ち絵切替 =====
function switchCharacter(character) {
  const safe = validateCharacter(character);
  if (safe === currentCharacter) return;

  document.body.className = "theme-" + safe;

  // 立ち絵フェード切替
  portrait.classList.remove("visible");
  portrait.classList.add("hidden");
  setTimeout(() => {
    portrait.src = "assets/cs/" + safe + ".webp";
    portrait.onload = () => {
      portrait.classList.remove("hidden");
      portrait.classList.add("visible");
    };
  }, 300);

  // 名前バー更新
  activeNameBar.className = "active-name-bar " + safe;
  activeNameBar.querySelector(".name").textContent = CHAR_NAMES[safe] || safe;
  activeNameBar.querySelector(".role").textContent = CHAR_ROLES[safe] || "";

  currentCharacter = safe;
}

// ===== セッション管理 =====
function getSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return { count: 0, date: "" };
    const s = JSON.parse(raw);
    const today = new Date().toISOString().slice(0, 10);
    if (s.date !== today) return { count: 0, date: today };
    return s;
  } catch { return { count: 0, date: "" }; }
}
function incrementSession() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getSession(); s.count++; s.date = today;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch {}
}
function checkSessionLimit() {
  const s = getSession();
  if (s.count >= SESSION_LIMIT) {
    addMsg("本日の受付は終了しました。…また明日お越しくださいね。", "system");
    setInputDisabled(true, "本日の上限に達しました");
    return false;
  }
  return true;
}
function setInputDisabled(disabled, placeholder) {
  sendBtn.disabled = disabled; msgInput.disabled = disabled;
  if (placeholder) msgInput.placeholder = placeholder;
  for (const btn of btnMenu.querySelectorAll("button")) btn.disabled = disabled;
}

// ===== 引き継ぎ演出 =====
function showTransfer(fromLine, toChar) {
  return new Promise((resolve) => {
    addCharMsg(currentCharacter, fromLine);
    setTimeout(() => {
      addTransferMsg("── " + (CHAR_NAMES[toChar] || toChar) + " に接続中 ──");
      setTimeout(() => {
        switchCharacter(toChar);
        resolve();
      }, 800);
    }, 500);
  });
}
function addTransferMsg(text) {
  const div = document.createElement("div");
  div.className = "msg system transfer";
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

// ===== ボタンメニュー =====
function onMenuBtn(category) {
  if (isSending) return;
  if (!checkSessionLimit()) return;
  reportMode = false;
  reportLabel.style.display = "none";
  msgInput.placeholder = "メンダに話しかける...";

  // メンダ以外から戻す
  if (currentCharacter !== "menda") switchCharacter("menda");

  switch (category) {
    case "faq":
      addMsg("ゲームについて聞きたい", "user");
      isSending = true; setInputDisabled(true);
      showTransfer("ゲームのことですね。…オウムさーん、お客さんですよー。", "oumu").then(() => {
        addCharMsg("oumu", "オウムだよ。ゲームのことなら、だいたい答えられる。");
        sendToWorker("ゲームについて教えてください", "menda");
      });
      break;
    case "billing":
      addMsg("お支払いについて", "user");
      isSending = true; setInputDisabled(true);
      showTransfer("お支払いですね。…デメニさん、お願いします。", "demeni").then(() => {
        addCharMsg("demeni", "デメニです。お支払い関連ですね。確認します。");
        sendToWorker("課金について教えてください", "menda");
      });
      break;
    case "policy":
      addMsg("規約について", "user");
      isSending = true; setInputDisabled(true);
      showTransfer("規約ですね…グソクさん、出番です。", "gusoku").then(() => {
        addCharMsg("gusoku", "…グソクだ。規約関連なら対応できる。");
        sendToWorker("利用規約について教えてください", "menda");
      });
      break;
    case "bug":
      addMsg("バグ報告", "user");
      showTransfer("バグ…ですか。リュウグウさん、聞いてあげてください。", "ryuuguu").then(() => {
        addCharMsg("ryuuguu", "…不具合のこと、聞かせてください。\n下の入力欄に書いて送信してくださいね。");
        reportMode = "bug";
        reportLabelText.textContent = "バグ報告モード";
        reportLabel.style.display = "block";
        msgInput.placeholder = "バグの内容を入力...";
        msgInput.focus();
      });
      break;
    case "feedback":
      addMsg("ご意見・要望", "user");
      showTransfer("ご意見…ありがとうございます。リュウグウさんが聞いてくれますよ。", "ryuuguu").then(() => {
        addCharMsg("ryuuguu", "…お話、聞かせてください。\n下の入力欄にご意見やご要望を書いて送信してくださいね。");
        reportMode = "feedback";
        reportLabelText.textContent = "ご意見・要望モード";
        reportLabel.style.display = "block";
        msgInput.placeholder = "ご意見・要望を入力...";
        msgInput.focus();
      });
      break;
    case "survey":
      addMsg("アンケート", "user");
      showTransfer("アンケートですね。…ありがとうございます。ホウズキさん、お願いします。", "houzuki").then(() => {
        addCharMsg("houzuki", "あ、あの…ホウズキです。ご協力、いただけると助かります。\n\nBFTKを何で知りましたか？ 下の入力欄で教えていただけると嬉しいです。");
        reportMode = "survey";
        reportLabelText.textContent = "アンケートモード";
        reportLabel.style.display = "block";
        msgInput.placeholder = "回答を入力...";
        msgInput.focus();
      });
      break;
  }
}

function cancelReportMode() {
  reportMode = false;
  reportLabel.style.display = "none";
  msgInput.placeholder = "メンダに話しかける...";
  switchCharacter("menda");
  msgInput.focus();
}

// ===== 送信処理 =====
msgInput.addEventListener("keydown", (e) => {
  if (e.isComposing) return;
  if (e.key === "Enter" && !sendBtn.disabled && !isSending) sendMsg();
});

async function sendMsg() {
  if (isSending) return;
  const text = msgInput.value.trim();
  if (!text) return;
  if (!checkSessionLimit()) return;
  isSending = true; setInputDisabled(true);
  addMsg(text, "user");
  msgInput.value = "";
  try {
    if (reportMode) {
      const rt = reportMode;
      reportMode = false;
      reportLabel.style.display = "none";
      msgInput.placeholder = "メンダに話しかける...";
      await sendReport(text, rt);
    } else {
      await sendToWorker(text, currentCharacter);
    }
  } finally {
    isSending = false;
    if (!checkSessionLimit()) return;
    setInputDisabled(false);
    msgInput.placeholder = "メンダに話しかける...";
    msgInput.focus();
  }
}

async function sendReport(text, reportType) {
  const loadingEl = showLoading();
  try {
    const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, bugReport: true, reportType: reportType }) });
    const data = await res.json();
    removeLoading(loadingEl);
    const replyChar = validateCharacter(data.character);
    switchCharacter(replyChar);
    addCharMsg(replyChar, data.reply || "…ありがとうございます。届けますね。");
    incrementSession();
  } catch (e) { removeLoading(loadingEl); addMsg("通信エラー: サーバーに接続できません", "error"); }
}

async function sendToWorker(text, character) {
  const loadingEl = showLoading();
  try {
    const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: conversationHistory, character: character }) });
    const data = await res.json();
    removeLoading(loadingEl);
    if (data.reply) {
      const replyChar = validateCharacter(data.character);
      switchCharacter(replyChar);
      addCharMsg(replyChar, data.reply);
      if (data.source === "llm") {
        conversationHistory.push({ role: "user", content: text });
        conversationHistory.push({ role: "assistant", content: data.reply });
        if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
      }
      incrementSession();
    } else { addMsg("エラー: " + (data.error || "応答なし"), "error"); }
  } catch (e) { removeLoading(loadingEl); addMsg("通信エラー: サーバーに接続できません", "error"); }
}

function validateCharacter(raw) {
  if (typeof raw === "string" && VALID_CHARACTERS.includes(raw)) return raw;
  return "menda";
}

// ===== ローディング =====
function showLoading() {
  const div = document.createElement("div");
  div.className = "msg loading"; div.setAttribute("aria-label", "応答待ち");
  const span = document.createElement("span"); span.textContent = "考え中"; span.className = "loading-dots";
  div.appendChild(span); chatLog.appendChild(div); chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}
function removeLoading(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

// ===== URLリンク化 =====
const URL_REGEX = /https?:\/\/[^\s<>"')\]]+/g;
const ALLOWED_URL_HOSTS = ["bftk-game.com", "support.apple.com", "support.google.com"];
function linkifyText(text, container) {
  let lastIndex = 0; let match; URL_REGEX.lastIndex = 0;
  while ((match = URL_REGEX.exec(text)) !== null) {
    if (match.index > lastIndex) container.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
    const url = match[0]; let isAllowed = false;
    try { const p = new URL(url); isAllowed = ALLOWED_URL_HOSTS.some(h => p.hostname === h || p.hostname.endsWith("." + h)); } catch {}
    if (isAllowed) { const a = document.createElement("a"); a.href = url; a.textContent = url; a.target = "_blank"; a.rel = "noopener"; container.appendChild(a); }
    else { container.appendChild(document.createTextNode(url)); }
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) container.appendChild(document.createTextNode(text.slice(lastIndex)));
}

// ===== メッセージ表示 =====
function addMsg(text, type) {
  const div = document.createElement("div"); div.className = "msg " + type;
  div.textContent = text; chatLog.appendChild(div); chatLog.scrollTop = chatLog.scrollHeight;
}
function addCharMsg(character, text) {
  const safeChar = validateCharacter(character);
  const div = document.createElement("div"); div.className = "msg bot " + safeChar;
  const label = document.createElement("div"); label.className = "char-label " + safeChar;
  label.textContent = CHAR_NAMES[safeChar] || safeChar; div.appendChild(label);
  const body = document.createElement("div"); body.className = "msg-body";
  linkifyText(text, body); div.appendChild(body);
  chatLog.appendChild(div); chatLog.scrollTop = chatLog.scrollHeight;
}

// プリロード
VALID_CHARACTERS.forEach(c => { const i = new Image(); i.src = "assets/cs/" + c + ".webp"; });
// 初期状態: 入力無効（コール後に有効化）
setInputDisabled(true, "コールしてください");
checkSessionLimit();
</script>
