<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://chat.bftk-game.com; frame-ancestors 'none';">
<title>BFTK - 深海コールセンター</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100dvh; }
.chat-container { width: 420px; max-width: 95vw; max-height: 100dvh; background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #1A237E; display: flex; flex-direction: column; }
.chat-header { background: #1A237E; padding: 16px; text-align: center; flex-shrink: 0; }
.chat-header h1 { color: #e0e8ff; font-size: 18px; }
.chat-header p { color: #8899cc; font-size: 12px; margin-top: 4px; }
.chat-log { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { padding: 10px 14px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
.msg.user { background: #2a2a3e; align-self: flex-end; }
.msg.bot { align-self: flex-start; }
.msg.error { background: #4a0000; align-self: flex-start; border: 1px solid #ff4444; }
.msg.system { background: #1a1a2e; align-self: center; color: #8899cc; font-size: 12px; border: 1px solid #333; }
.msg a { color: #8899cc; text-decoration: underline; }

/* キャラ別メッセージ色 */
.msg.bot.menda { background: #3a2010; border: 1px solid #c07040; }
.msg.bot.gusoku { background: #2a2a30; border: 1px solid #666; }
.msg.bot.demeni { background: #1a2a30; border: 1px solid #4080a0; }
.msg.bot.oumu { background: #2a2810; border: 1px solid #a09040; }
.msg.bot.ryuuguu { background: #2a1a20; border: 1px solid #a06070; }
.msg.bot.houzuki { background: #2a1a30; border: 1px solid #8060a0; }

/* キャラ名ラベル */
.char-label { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
.char-label.menda { color: #c07040; }
.char-label.gusoku { color: #888; }
.char-label.demeni { color: #4080a0; }
.char-label.oumu { color: #a09040; }
.char-label.ryuuguu { color: #a06070; }
.char-label.houzuki { color: #8060a0; }

/* ローディング表示 */
.msg.loading { align-self: flex-start; background: #1a1a2e; border: 1px solid #333; color: #8899cc; font-size: 13px; }
@keyframes dots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
.loading-dots::after { content: ''; animation: dots 1.2s steps(1) infinite; }

/* ボタンメニュー */
.btn-menu { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; justify-content: center; border-top: 1px solid #333; flex-shrink: 0; }
.btn-menu button {
  padding: 8px 14px; border-radius: 20px; border: 1px solid #556;
  background: transparent; color: #aab; font-size: 13px; cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.btn-menu button:hover { background: #1A237E; color: #e0e8ff; border-color: #1A237E; }
.btn-menu button:disabled { opacity: 0.4; cursor: not-allowed; }

/* 入力エリア */
.chat-input { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #333; flex-shrink: 0; }
.chat-input input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
.chat-input input:focus { border-color: #1A237E; }
.chat-input button { padding: 10px 20px; border-radius: 8px; border: none; background: #1A237E; color: #e0e8ff; font-weight: bold; font-size: 14px; cursor: pointer; white-space: nowrap; }
.chat-input button:disabled { background: #333; cursor: not-allowed; }

/* 報告モード表示 */
.report-mode-label { color: #a06070; font-size: 12px; padding: 4px 12px; text-align: center; flex-shrink: 0; }
.cancel-btn { color: #888; cursor: pointer; text-decoration: underline; margin-left: 8px; background: none; border: none; font-size: 12px; padding: 0; }
.cancel-btn:hover { color: #e0e0e0; }
.cancel-btn:focus { outline: 1px solid #8899cc; outline-offset: 2px; }
</style>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h1>BFTK Deep Sea CS</h1>
    <p>深海コールセンター</p>
  </div>
  <div class="chat-log" id="chatLog" role="log" aria-live="polite" aria-label="チャット履歴">
    <div class="msg bot menda"><div class="char-label menda">メンダ</div>あ、いらっしゃいませ。受付のメンダです。…どうされました？ 下のボタンからも選べますよ。</div>
  </div>
  <div class="btn-menu" id="btnMenu" role="toolbar" aria-label="メニュー">
    <button onclick="onMenuBtn('faq')">ゲームについて</button>
    <button onclick="onMenuBtn('billing')">お支払い</button>
    <button onclick="onMenuBtn('policy')">規約</button>
    <button onclick="onMenuBtn('bug')">バグ報告</button>
    <button onclick="onMenuBtn('feedback')">ご意見・要望</button>
    <button onclick="onMenuBtn('survey')">アンケート</button>
  </div>
  <div class="report-mode-label" id="reportLabel" style="display:none;"><span id="reportLabelText"></span> <button class="cancel-btn" onclick="cancelReportMode()">[ キャンセル ]</button></div>
  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="メンダに話しかける..." maxlength="500" aria-label="メッセージ入力">
    <button id="sendBtn" onclick="sendMsg()">送信</button>
  </div>
</div>
<script>
const WORKER_URL = "https://chat.bftk-game.com";
const SESSION_LIMIT = 30;
const SESSION_KEY = "bftk_chat_session";
const chatLog = document.getElementById("chatLog");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const btnMenu = document.getElementById("btnMenu");
const reportLabel = document.getElementById("reportLabel");
const reportLabelText = document.getElementById("reportLabelText");

// 許可キャラクター（Worker側と一致）
const VALID_CHARACTERS = ["menda", "gusoku", "demeni", "oumu", "ryuuguu", "houzuki"];

// キャラ名マッピング
const CHAR_NAMES = {
  menda: "メンダ", gusoku: "グソク", demeni: "デメニ",
  oumu: "オウム", ryuuguu: "リュウグウ", houzuki: "ホウズキ",
};

let conversationHistory = [];
let reportMode = false; // false | "bug" | "feedback" | "survey"
let currentCharacter = "menda";
let isSending = false; // 二重送信防止フラグ

// ===== セッション管理 =====
function getSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return { count: 0, date: "" };
    const s = JSON.parse(raw);
    const today = new Date().toISOString().slice(0, 10);
    if (s.date !== today) return { count: 0, date: today };
    return s;
  } catch { return { count: 0, date: "" }; }
}

function incrementSession() {
  const today = new Date().toISOString().slice(0, 10);
  const s = getSession();
  s.count++;
  s.date = today;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch {}
}

function checkSessionLimit() {
  const s = getSession();
  if (s.count >= SESSION_LIMIT) {
    addMsg("本日の受付は終了しました。…また明日お越しくださいね。", "system");
    setInputDisabled(true, "本日の上限に達しました");
    return false;
  }
  return true;
}

function setInputDisabled(disabled, placeholder) {
  sendBtn.disabled = disabled;
  msgInput.disabled = disabled;
  if (placeholder) msgInput.placeholder = placeholder;
  for (const btn of btnMenu.querySelectorAll("button")) {
    btn.disabled = disabled;
  }
}

// ===== ボタンメニュー処理 =====
function onMenuBtn(category) {
  if (isSending) return;
  if (!checkSessionLimit()) return;

  reportMode = false;
  reportLabel.style.display = "none";
  msgInput.placeholder = "メンダに話しかける...";

  switch (category) {
    case "faq":
      addMsg("ゲームについて聞きたい", "user");
      addCharMsg("menda", "ゲームのことですね。…オウムさんが詳しいので、代わりますね。");
      sendToWorker("ゲームについて教えてください", "menda");
      break;

    case "billing":
      addMsg("お支払いについて", "user");
      addCharMsg("menda", "お支払いのことですね。…デメニさんに代わりますね。");
      sendToWorker("課金について教えてください", "menda");
      break;

    case "policy":
      addMsg("規約について", "user");
      addCharMsg("menda", "規約ですね。…グソクさんに聞いてみましょう。");
      sendToWorker("利用規約について教えてください", "menda");
      break;

    case "bug":
      addMsg("バグ報告", "user");
      addCharMsg("ryuuguu", "…バグの内容を教えてください。下の入力欄に書いて送信してくださいね。");
      reportMode = "bug";
      reportLabelText.textContent = "バグ報告モード：内容を入力して送信してください";
      reportLabel.style.display = "block";
      msgInput.placeholder = "バグの内容を入力...";
      msgInput.focus();
      break;

    case "feedback":
      addMsg("ご意見・要望", "user");
      addCharMsg("ryuuguu", "…お話、聞かせてください。下の入力欄にご意見やご要望を書いて送信してくださいね。");
      reportMode = "feedback";
      reportLabelText.textContent = "ご意見・要望モード：内容を入力して送信してください";
      reportLabel.style.display = "block";
      msgInput.placeholder = "ご意見・要望を入力...";
      msgInput.focus();
      break;

    case "survey":
      addMsg("アンケート", "user");
      addCharMsg("houzuki", "あ、あの…ホウズキです。もしよければ…簡単なアンケートにご協力いただけると嬉しいです。\n\nBFTKを何で知りましたか？ 下の入力欄で教えていただけると…すごく助かります…！");
      reportMode = "survey";
      reportLabelText.textContent = "アンケートモード：回答を入力して送信してください";
      reportLabel.style.display = "block";
      msgInput.placeholder = "回答を入力...（答えなくても大丈夫です）";
      msgInput.focus();
      break;
  }
}

function cancelReportMode() {
  reportMode = false;
  reportLabel.style.display = "none";
  msgInput.placeholder = "メンダに話しかける...";
  msgInput.focus();
}

// ===== 送信処理 =====
msgInput.addEventListener("keydown", (e) => {
  // IME確定中のEnterは無視
  if (e.isComposing) return;
  if (e.key === "Enter" && !sendBtn.disabled && !isSending) sendMsg();
});

async function sendMsg() {
  if (isSending) return; // 二重送信防止
  const text = msgInput.value.trim();
  if (!text) return;
  if (!checkSessionLimit()) return;

  isSending = true;
  setInputDisabled(true);

  addMsg(text, "user");
  msgInput.value = "";

  try {
    if (reportMode) {
      const rt = reportMode;
      reportMode = false;
      reportLabel.style.display = "none";
      msgInput.placeholder = "メンダに話しかける...";
      await sendReport(text, rt);
    } else {
      await sendToWorker(text, currentCharacter);
    }
  } finally {
    isSending = false;
    if (!checkSessionLimit()) return;
    setInputDisabled(false);
    msgInput.placeholder = "メンダに話しかける...";
    msgInput.focus();
  }
}

async function sendReport(text, reportType) {
  const loadingEl = showLoading();
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, bugReport: true, reportType: reportType }),
    });
    const data = await res.json();
    removeLoading(loadingEl);
    const replyChar = validateCharacter(data.character);
    addCharMsg(replyChar, data.reply || "…ありがとうございます。届けますね。");
    incrementSession();
  } catch (e) {
    removeLoading(loadingEl);
    addMsg("通信エラー: サーバーに接続できません", "error");
  }
}

async function sendToWorker(text, character) {
  const loadingEl = showLoading();
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: conversationHistory,
        character: character,
      }),
    });
    const data = await res.json();
    removeLoading(loadingEl);
    if (data.reply) {
      const replyChar = validateCharacter(data.character);
      addCharMsg(replyChar, data.reply);
      if (data.source === "llm") {
        conversationHistory.push({ role: "user", content: text });
        conversationHistory.push({ role: "assistant", content: data.reply });
        if (conversationHistory.length > 10) {
          conversationHistory = conversationHistory.slice(-10);
        }
      }
      incrementSession();
    } else {
      addMsg("エラー: " + (data.error || "応答なし"), "error");
    }
  } catch (e) {
    removeLoading(loadingEl);
    addMsg("通信エラー: サーバーに接続できません", "error");
  }
}

// ===== character検証 =====
function validateCharacter(raw) {
  if (typeof raw === "string" && VALID_CHARACTERS.includes(raw)) return raw;
  return "menda";
}

// ===== ローディング表示 =====
function showLoading() {
  const div = document.createElement("div");
  div.className = "msg loading";
  div.setAttribute("aria-label", "応答待ち");
  const span = document.createElement("span");
  span.textContent = "考え中";
  span.className = "loading-dots";
  div.appendChild(span);
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}

function removeLoading(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

// ===== URLリンク化（DOM APIベース・XSS安全） =====
const URL_REGEX = /https?:\/\/[^\s<>"')\]]+/g;
const ALLOWED_URL_HOSTS = ["bftk-game.com", "support.apple.com", "support.google.com"];

function linkifyText(text, container) {
  let lastIndex = 0;
  let match;
  URL_REGEX.lastIndex = 0;
  let hasUrl = false;

  while ((match = URL_REGEX.exec(text)) !== null) {
    hasUrl = true;
    // マッチ前のテキスト
    if (match.index > lastIndex) {
      container.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
    }
    // URL部分
    const url = match[0];
    let isAllowed = false;
    try {
      const parsed = new URL(url);
      isAllowed = ALLOWED_URL_HOSTS.some(h => parsed.hostname === h || parsed.hostname.endsWith("." + h));
    } catch {}

    if (isAllowed) {
      const a = document.createElement("a");
      a.href = url;
      a.textContent = url;
      a.target = "_blank";
      a.rel = "noopener";
      container.appendChild(a);
    } else {
      container.appendChild(document.createTextNode(url));
    }
    lastIndex = match.index + match[0].length;
  }

  // 残りのテキスト
  if (lastIndex < text.length) {
    container.appendChild(document.createTextNode(text.slice(lastIndex)));
  }

  return hasUrl;
}

// ===== メッセージ表示 =====
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  if (type === "bot") {
    linkifyText(text, div);
  } else {
    div.textContent = text;
  }
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function addCharMsg(character, text) {
  const safeChar = validateCharacter(character);
  const div = document.createElement("div");
  div.className = "msg bot " + safeChar;

  // キャラ名ラベル
  const label = document.createElement("div");
  label.className = "char-label " + safeChar;
  label.textContent = CHAR_NAMES[safeChar] || safeChar;
  div.appendChild(label);

  // 本文（DOM APIベースURL対応）
  const body = document.createElement("div");
  linkifyText(text, body);
  div.appendChild(body);

  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

// 起動時チェック
checkSessionLimit();
</script>
</body>
</html>
